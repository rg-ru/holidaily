services:
  - type: web
    name: holidaily-live
    runtime: python
    plan: starter
    region: frankfurt
    autoDeploy: true
    healthCheckPath: /
    buildCommand: python -m py_compile server/app.py
    startCommand: python server/app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: HOST
        value: 0.0.0.0
      - key: HOLIDAILY_DB_DIR
        value: /var/data
    disk:
      name: holidaily-data
      mountPath: /var/data
      sizeGB: 1
