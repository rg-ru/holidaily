name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        env:
          BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://holidaily-chat-api-rgru.onrender.com' }}
        run: |
          mkdir -p dist
          cp index.html dist/
          cp styles.css dist/
          cp app.js dist/
          cp chat-local-fallback.js dist/
          cp support-chat.js dist/
          cp .nojekyll dist/
          cp -R assets dist/assets
          cp -R admin dist/admin
          cat > dist/site-config.js <<EOF
          window.HolidailyRuntimeConfig = window.HolidailyRuntimeConfig || {};
          window.HolidailyRuntimeConfig.backendBaseUrl = "${BACKEND_BASE_URL}";
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
